<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Vision & Chat Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .hidden {
            display: none;
        }
        .preview-container {
            position: relative;
            display: inline-block;
        }
        .remove-preview {
            position: absolute;
            top: -10px;
            right: -10px;
            background: red;
            color: white;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 12px;
        }
        #webcam-feed {
            transform: scaleX(-1);
            width: 100%;
            border-radius: 8px;
        }
        .tab-active {
            border-bottom: 3px solid #3b82f6;
            color: #3b82f6;
            font-weight: 600;
        }
        .message-streaming {
            opacity: 0.7;
        }
        .typing-indicator::after {
            content: '...';
            animation: typing 1.5s infinite;
            display: inline-block;
            width: 0;
        }
        @keyframes typing {
            0% { content: '.'; }
            33% { content: '..'; }
            66% { content: '...'; }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-6xl">
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-gray-800 mb-2">AI Vision & Chat Interface</h1>
            <p class="text-gray-600">Combine multimodal inputs with custom system prompts</p>
        </header>

        <div class="bg-white rounded-xl shadow-lg overflow-hidden mb-8">
            <div class="flex border-b">
                <button id="chat-tab" class="tab-active flex-1 py-4 px-6 text-center focus:outline-none">
                    <i class="fas fa-comments mr-2"></i>Chat Interface
                </button>
                <button id="vision-tab" class="flex-1 py-4 px-6 text-center text-gray-500 focus:outline-none">
                    <i class="fas fa-camera mr-2"></i>Vision Interface
                </button>
            </div>

            <!-- System Prompt Section -->
            <div class="p-6 border-b">
                <label for="system-prompt" class="block text-sm font-medium text-gray-700 mb-2">System Prompt</label>
                <textarea id="system-prompt" rows="3" class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500" placeholder="You are a helpful AI assistant...">You are a helpful AI assistant that can process both text and visual inputs. Be concise in your responses.</textarea>
            </div>

            <!-- Chat Interface -->
            <div id="chat-interface" class="p-6">
                <div id="chat-container" class="mb-4 h-96 overflow-y-auto border border-gray-200 rounded-lg p-4 bg-gray-50">
                    <div class="message ai-message mb-4">
                        <div class="bg-blue-50 p-3 rounded-lg inline-block max-w-full">
                            <p class="text-gray-800">Hello! I'm your AI assistant. How can I help you today?</p>
                        </div>
                    </div>
                </div>

                <div id="file-previews" class="flex flex-wrap gap-2 mb-4"></div>

                <div class="flex items-center">
                    <div class="relative flex-grow">
                        <input id="user-input" type="text" placeholder="Type your message..." class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <div class="absolute right-2 top-1/2 transform -translate-y-1/2 flex gap-2">
                            <label for="file-upload" class="cursor-pointer text-gray-500 hover:text-blue-500">
                                <i class="fas fa-paperclip"></i>
                                <input id="file-upload" type="file" class="hidden" accept="image/*,video/*" multiple>
                            </label>
                        </div>
                    </div>
                    <button id="send-button" class="ml-3 bg-blue-500 hover:bg-blue-600 text-white px-6 py-3 rounded-lg font-medium transition duration-200">
                        <i class="fas fa-paper-plane mr-2"></i>Send
                    </button>
                </div>
            </div>

            <!-- Vision Interface -->
            <div id="vision-interface" class="hidden p-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <div class="mb-4">
                            <div class="relative aspect-video bg-gray-200 rounded-lg overflow-hidden">
                                <video id="webcam-feed" autoplay playsinline></video>
                                <div id="webcam-overlay" class="absolute inset-0 flex items-center justify-center">
                                    <button id="start-webcam" class="bg-blue-500 hover:bg-blue-600 text-white px-6 py-3 rounded-lg font-medium transition duration-200">
                                        <i class="fas fa-video mr-2"></i>Start Webcam
                                    </button>
                                </div>
                            </div>
                        </div>
                        <div class="flex justify-center gap-4 items-center">
                            <div class="flex items-center">
                                <label for="interval-input" class="mr-2 text-sm font-medium text-gray-700">Interval (s):</label>
                                <input id="interval-input" type="number" min="0.1" max="10" step="0.1" value="1" class="w-16 px-2 py-1 border border-gray-300 rounded-md">
                            </div>
                            <button id="process-vision" class="bg-green-500 hover:bg-green-600 text-white px-6 py-3 rounded-lg font-medium transition duration-200 disabled:opacity-50" disabled>
                                <i class="fas fa-brain mr-2"></i>Process
                            </button>
                        </div>
                    </div>
                    <div>
                        <div id="vision-output" class="h-full bg-gray-50 border border-gray-200 rounded-lg p-4 overflow-y-auto">
                            <p class="text-gray-500 italic">Your processed vision output will appear here...</p>
                        </div>
                    </div>
                </div>
                <div id="captured-frames" class="mt-6 flex flex-wrap gap-2"></div>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-lg overflow-hidden p-6">
            <h3 class="font-medium text-lg mb-4">API Configuration</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label for="api-key" class="block text-sm font-medium text-gray-700 mb-1">OpenAI API Key</label>
                    <input id="api-key" type="password" class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500" placeholder="sk-...">
                </div>
                <div>
                    <label for="model-select" class="block text-sm font-medium text-gray-700 mb-1">Model</label>
                    <select id="model-select" class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
                        <option value="Qwen3-0.6B">Qwen3-0.6B</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <script>
        // DOM Elements
        const chatTab = document.getElementById('chat-tab');
        const visionTab = document.getElementById('vision-tab');
        const chatInterface = document.getElementById('chat-interface');
        const visionInterface = document.getElementById('vision-interface');
        
        // Chat elements
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const sendButton = document.getElementById('send-button');
        const fileInput = document.getElementById('file-upload');
        const filePreviews = document.getElementById('file-previews');
        const selectFilesBtn = document.querySelector("label[for=\"file-upload\"]");
        const sendBtn = document.getElementById("send-button");

        // Vision elements
        const webcamFeed = document.getElementById('webcam-feed');
        const webcamOverlay = document.getElementById('webcam-overlay');
        const startWebcam = document.getElementById('start-webcam');
        const captureFrame = document.getElementById('capture-frame');
        const processVision = document.getElementById('process-vision');
        const visionOutput = document.getElementById('vision-output');
        const capturedFrames = document.getElementById('captured-frames');
        
        // Config elements
        const systemPrompt = document.getElementById('system-prompt');
        const apiKey = document.getElementById('api-key');
        const modelSelect = document.getElementById('model-select');
        
        // State
        let stream = null;
        let capturedImages = [];
        let filesToUpload = [];
        let processingInterval = null;
        
        // Tab switching
        chatTab.addEventListener('click', () => {
            chatTab.classList.add('tab-active');
            visionTab.classList.remove('tab-active');
            chatInterface.classList.remove('hidden');
            visionInterface.classList.add('hidden');
            stopWebcam();
        });
        
        visionTab.addEventListener('click', () => {
            visionTab.classList.add('tab-active');
            chatTab.classList.remove('tab-active');
            visionInterface.classList.remove('hidden');
            chatInterface.classList.add('hidden');
        });
        
        // State
      let uploadedFiles = [];

      // File upload preview
      fileInput.addEventListener("change", (e) => {
        uploadedFiles = Array.from(e.target.files).filter(f => f.type.startsWith('image/') || f.type.startsWith('video/'));
        renderFilePreviews();
      });

      function renderFilePreviews() {
        filePreviews.innerHTML = '';
        uploadedFiles.forEach((file, i) => {
          const container = document.createElement('div'); container.className='preview-container';
          const remove = document.createElement('span'); remove.className='remove-preview'; remove.innerText='×';
          remove.onclick = () => { uploadedFiles.splice(i,1); renderFilePreviews(); };
          if (file.type.startsWith('image/')) {
            const img = document.createElement('img'); img.src=URL.createObjectURL(file); img.className='h-24 rounded-lg object-cover'; container.append(img);
          } else {
            const p = document.createElement('p'); p.innerText=file.name; container.append(p);
          }
          container.append(remove); filePreviews.append(container);
        });
      }

      // Chat message rendering
      function addMessageToChat(role, content, streaming = false) {
        const wrapper = document.createElement('div');
        wrapper.className = `message ${role}-message mb-4 ${streaming? 'message-streaming':''}`;
        const bubble = document.createElement('div');
        bubble.className = role==='user' ? 'bg-gray-100 p-3 rounded-lg inline-block max-w-full' : 'bg-blue-50 p-3 rounded-lg inline-block max-w-full';
        if (typeof content==='string') bubble.innerHTML=`<p class="text-gray-800">${content}</p>`;
        wrapper.append(bubble); chatContainer.append(wrapper);
        chatContainer.scrollTop=chatContainer.scrollHeight;
        return wrapper;
      }

      async function sendChatMessage() {
        const text = userInput.value.trim();
        if (!text && uploadedFiles.length===0) return;
        // Prepare user content array
        const userContent=[];
        if (text) userContent.push({ type:'text', text });
        for (const f of uploadedFiles) {
          if (f.type.startsWith('image/')) {
            const base64 = await fileToBase64(f);
            userContent.push({ type:'image_url', image_url:{ url:`data:${f.type};base64,${base64}` } });
          } else {
            userContent.push({ type:'text', text:`[File: ${f.name}]` });
          }
        }
        addMessageToChat('user', userContent.map(i=>i.type==='text'?i.text:'[Image]').join('\n'));
        userInput.value=''; uploadedFiles=[]; renderFilePreviews();

        const aiDiv = addMessageToChat('ai','Thinking...', true);
        try {
          const response = await fetch("https://cors-anywhere.herokuapp.com/" + encodeURIComponent("https://glowing-workable-arachnid.ngrok-free.app/v1/chat/completions"), {
            method:'POST',
            headers:{ 'Content-Type':'application/json', Authorization:`Bearer YOUR_API_KEY` },
            body: JSON.stringify({ model: modelSelect.value, messages:[{role:'system',content:systemPrompt.value},{role:'user',content:userContent}], stream:true })
          });
          const reader = response.body.getReader(), dec=new TextDecoder(); let buffer='';
          while(true) {
            const {done,value}=await reader.read(); if(done) break;
            buffer += dec.decode(value, {stream:true});
            const lines = buffer.split('\n'); buffer = lines.pop();
            for(const line of lines.filter(l=>l.startsWith('data:'))) {
              const d = line.replace('data: ',''); if(d==='[DONE]') break;
              const json=JSON.parse(d); const delta=json.choices[0].delta.content;
              if(delta) {
                aiDiv.querySelector('div').innerHTML = '<p class="text-gray-800">'+delta+'</p>';
                chatContainer.scrollTop=chatContainer.scrollHeight;
              }
            }
          }
          aiDiv.classList.remove('message-streaming');
        } catch(err) {
          aiDiv.querySelector('div').innerHTML=`<p class='text-red-500'>${err.message}</p>`;
          aiDiv.classList.remove('message-streaming');
        }
      }

      function fileToBase64(file) {
        return new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result.split(',')[1]); r.onerror=rej; r.readAsDataURL(file); });
      }

      sendBtn.addEventListener('click', sendChatMessage);
      userInput.addEventListener('keypress',(e)=>{ if(e.key==='Enter') sendChatMessage(); });
        
        // Vision functionality
        async function startWebcamFeed() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: true });
                webcamFeed.srcObject = stream;
                webcamOverlay.classList.add('hidden');
                captureFrame.disabled = false;
                processVision.disabled = false;
                startWebcam.textContent = 'Stop Webcam';
                startWebcam.classList.remove('bg-blue-500');
                startWebcam.classList.add('bg-red-500');
                startWebcam.removeEventListener('click', startWebcamFeed);
                startWebcam.addEventListener('click', stopWebcam);
            } catch (err) {
                console.error("Error accessing webcam:", err);
                alert("Could not access the webcam. Please check permissions.");
            }
        }
        
        function stopWebcam() {
            if (processingInterval) {
                clearInterval(processingInterval);
                processingInterval = null;
                processVision.innerHTML = '<i class="fas fa-brain mr-2"></i>Process';
            }
            
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
            }
            webcamFeed.srcObject = null;
            webcamOverlay.classList.remove('hidden');
            processVision.disabled = true;
            startWebcam.textContent = 'Start Webcam';
            startWebcam.classList.remove('bg-red-500');
            startWebcam.classList.add('bg-blue-500');
            startWebcam.removeEventListener('click', stopWebcam);
            startWebcam.addEventListener('click', startWebcamFeed);
        }
        
        function captureWebcamFrame() {
            if (!stream) return;
            
            const canvas = document.createElement('canvas');
            canvas.width = webcamFeed.videoWidth;
            canvas.height = webcamFeed.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(webcamFeed, 0, 0, canvas.width, canvas.height);
            
            const dataUrl = canvas.toDataURL('image/jpeg');
            capturedImages.push(dataUrl);
            
            // Add to preview
            const img = document.createElement('img');
            img.src = dataUrl;
            img.className = 'h-24 rounded-lg object-cover';
            img.dataset.index = capturedImages.length - 1;
            img.addEventListener('click', () => {
                capturedImages.splice(parseInt(img.dataset.index), 1);
                renderCapturedFrames();
            });
            
            renderCapturedFrames();
        }
        
        function renderCapturedFrames() {
            capturedFrames.innerHTML = '';
            capturedImages.forEach((imgData, index) => {
                const container = document.createElement('div');
                container.className = 'preview-container';
                
                const img = document.createElement('img');
                img.src = imgData;
                img.className = 'h-24 rounded-lg object-cover';
                img.dataset.index = index;
                
                const removeBtn = document.createElement('span');
                removeBtn.className = 'remove-preview';
                removeBtn.innerHTML = '×';
                removeBtn.addEventListener('click', () => {
                    capturedImages.splice(index, 1);
                    renderCapturedFrames();
                });
                
                container.appendChild(img);
                container.appendChild(removeBtn);
                capturedFrames.appendChild(container);
            });
        }
        
        async function processVisionInput() {
            const intervalInput = document.getElementById('interval-input');
            const interval = parseFloat(intervalInput.value) * 1000;
            
            if (processingInterval) {
                // Stop processing
                clearInterval(processingInterval);
                processingInterval = null;
                processVision.innerHTML = '<i class="fas fa-brain mr-2"></i>Process';
                return;
            }
            
            // Start processing
            processVision.innerHTML = '<i class="fas fa-stop mr-2"></i>Stop';
            
            // Process immediately first
            await processSingleFrame();
            
            // Then set up interval
            processingInterval = setInterval(async () => {
                await processSingleFrame();
            }, interval);
        }
        
        async function processSingleFrame() {
            if (!stream) return;
            
            // Capture current frame
            const canvas = document.createElement('canvas');
            canvas.width = webcamFeed.videoWidth;
            canvas.height = webcamFeed.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(webcamFeed, 0, 0, canvas.width, canvas.height);
            const dataUrl = canvas.toDataURL('image/jpeg');
            
            visionOutput.innerHTML = '<p class="text-gray-500 italic">Processing frame...</p>';
            
            try {
                const messages = [
                    { role: 'system', content: systemPrompt.value },
                    {
                        role: 'user',
                        content: [
                            { type: 'text', text: 'Please analyze this image from my webcam:' },
                            { type: 'image_url', image_url: { url: dataUrl } }
                        ]
                    }
                ];
                const proxy = "https://cors-anywhere.herokuapp.com/" + encodeURIComponent("https://glowing-workable-arachnid.ngrok-free.app/v1/chat/completions");
                const response = await fetch(proxy, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${apiKey.value}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: modelSelect.value,
                        messages: messages
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                const content = data.choices[0].message.content;
                visionOutput.innerHTML = `
                    <div class="mb-4">
                        <img src="${dataUrl}" class="max-w-full h-auto rounded-lg mb-2">
                        <p class="text-gray-800">${content}</p>
                    </div>
                    ${visionOutput.innerHTML}
                `;
            } catch (error) {
                console.error('Error processing vision:', error);
                visionOutput.innerHTML = `
                    <div class="mb-4">
                        <p class="text-red-500">Error: ${error.response?.data?.error?.message || error.message}</p>
                    </div>
                    ${visionOutput.innerHTML}
                `;
            }
        }
        
        startWebcam.addEventListener('click', startWebcamFeed);
        processVision.addEventListener('click', processVisionInput);
        
        // Initialize
        renderCapturedFrames();
    </script>
</body>
</html>
